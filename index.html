<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>عيادة نور | لوحة المواعيد التفاعلية</title>
    <!-- Tailwind CSS + Font Awesome + Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #eef2f9 100%);
            min-height: 100vh;
        }
        .dashboard-card {
            backdrop-filter: blur(2px);
            transition: all 0.2s ease;
        }
        .table-wrapper::-webkit-scrollbar {
            height: 8px;
            width: 8px;
        }
        .table-wrapper::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }
        .table-wrapper::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 10px;
        }
        .table-wrapper::-webkit-scrollbar-thumb:hover {
            background: #5b6e8c;
        }
        .badge {
            transition: all 0.15s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        tr:hover td {
            background-color: #fefce8 !important;
            transition: 0.1s;
        }
        .sort-icon {
            opacity: 0.5;
            transition: opacity 0.2s;
            font-size: 0.7rem;
        }
        th:hover .sort-icon {
            opacity: 1;
        }
        .loading-spinner {
            border: 3px solid rgba(59,130,246,0.2);
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .glass-panel {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="p-4 md:p-6">

    <div class="max-w-[1600px] mx-auto">
        <!-- Header with title & stats row -->
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8">
            <div>
                <h1 class="text-3xl md:text-4xl font-bold bg-gradient-to-r from-[#1e3a8a] to-[#3b82f6] bg-clip-text text-transparent flex items-center gap-2">
                    <i class="fas fa-calendar-check text-blue-600"></i> 
                    لوحة المواعيد
                </h1>
                <p class="text-gray-500 mt-1 text-sm">إدارة وجدولة المواعيد – عرض آني من قاعدة البيانات</p>
            </div>
            <div class="flex gap-3">
                <button id="refreshBtn" class="bg-white shadow-md hover:shadow-lg text-gray-700 font-medium py-2 px-5 rounded-xl transition-all duration-200 flex items-center gap-2 border border-gray-200">
                    <i class="fas fa-sync-alt text-blue-500"></i> تحديث
                </button>
            </div>
        </div>

        <!-- Stats Cards (Dynamic) -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 mb-8">
            <div class="bg-white rounded-2xl shadow-sm p-5 border border-gray-100 flex items-center justify-between dashboard-card">
                <div>
                    <p class="text-gray-500 text-sm font-medium">إجمالي المواعيد</p>
                    <p id="totalCount" class="text-3xl font-bold text-gray-800 mt-1">0</p>
                </div>
                <div class="h-12 w-12 bg-blue-100 rounded-2xl flex items-center justify-center text-blue-600"><i class="fas fa-database text-xl"></i></div>
            </div>
            <div class="bg-white rounded-2xl shadow-sm p-5 border border-gray-100 flex items-center justify-between dashboard-card">
                <div>
                    <p class="text-gray-500 text-sm font-medium">قيد الانتظار</p>
                    <p id="pendingCount" class="text-3xl font-bold text-amber-600 mt-1">0</p>
                </div>
                <div class="h-12 w-12 bg-amber-50 rounded-2xl flex items-center justify-center text-amber-500"><i class="fas fa-hourglass-half text-xl"></i></div>
            </div>
            <div class="bg-white rounded-2xl shadow-sm p-5 border border-gray-100 flex items-center justify-between dashboard-card">
                <div>
                    <p class="text-gray-500 text-sm font-medium">مواعيد اليوم</p>
                    <p id="todayCount" class="text-3xl font-bold text-emerald-600 mt-1">0</p>
                </div>
                <div class="h-12 w-12 bg-emerald-50 rounded-2xl flex items-center justify-center text-emerald-500"><i class="fas fa-sun text-xl"></i></div>
            </div>
            <div class="bg-white rounded-2xl shadow-sm p-5 border border-gray-100 flex items-center justify-between dashboard-card">
                <div>
                    <p class="text-gray-500 text-sm font-medium">القادمة (7 أيام)</p>
                    <p id="upcomingCount" class="text-3xl font-bold text-indigo-600 mt-1">0</p>
                </div>
                <div class="h-12 w-12 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-500"><i class="fas fa-calendar-week text-xl"></i></div>
            </div>
        </div>

        <!-- Filters & Search Bar -->
        <div class="bg-white/70 backdrop-blur-sm rounded-2xl shadow-md p-5 mb-6 border border-gray-200/60">
            <div class="flex flex-col lg:flex-row gap-4 items-end">
                <div class="flex-1 w-full">
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1"><i class="fas fa-search mr-1"></i> بحث</label>
                    <input type="text" id="searchInput" placeholder="اسم المريض أو رقم الهاتف..." class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-400 focus:border-blue-400 outline-none transition">
                </div>
                <div class="w-full lg:w-64">
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1"><i class="fas fa-filter mr-1"></i> حالة الموعد</label>
                    <select id="statusFilter" class="w-full p-3 border border-gray-300 rounded-xl bg-white focus:ring-2 focus:ring-blue-400 outline-none">
                        <option value="all">جميع الحالات</option>
                        <option value="pending">قيد الانتظار</option>
                    </select>
                </div>
                <div class="w-full lg:w-48">
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1"><i class="fas fa-list-ol mr-1"></i> عرض</label>
                    <select id="rowsPerPageSelect" class="w-full p-3 border border-gray-300 rounded-xl bg-white focus:ring-2 focus:ring-blue-400 outline-none">
                        <option value="10">10 صفوف</option>
                        <option value="25">25 صفًا</option>
                        <option value="50">50 صفًا</option>
                        <option value="100">100 صف</option>
                    </select>
                </div>
                <button id="clearFiltersBtn" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-5 py-3 rounded-xl transition flex items-center gap-2 font-medium"><i class="fas fa-eraser"></i> مسح الكل</button>
            </div>
        </div>

        <!-- Elegant Data Table -->
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 dashboard-card">
            <div class="table-wrapper overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gradient-to-r from-gray-50 to-gray-100">
                        <tr>
                            <th class="px-5 py-4 text-right text-xs font-bold text-gray-600 uppercase tracking-wider cursor-pointer group" data-sort="patient_name">
                                <div class="flex items-center justify-end gap-1">المريض <i class="fas fa-sort sort-icon"></i></div>
                            </th>
                            <th class="px-5 py-4 text-right text-xs font-bold text-gray-600 uppercase tracking-wider cursor-pointer group" data-sort="phone">
                                <div class="flex items-center justify-end gap-1">الهاتف <i class="fas fa-sort sort-icon"></i></div>
                            </th>
                            <th class="px-5 py-4 text-right text-xs font-bold text-gray-600 uppercase tracking-wider cursor-pointer group" data-sort="appointment_date">
                                <div class="flex items-center justify-end gap-1">التاريخ <i class="fas fa-sort sort-icon"></i></div>
                            </th>
                            <th class="px-5 py-4 text-right text-xs font-bold text-gray-600 uppercase tracking-wider cursor-pointer group" data-sort="appointment_time">
                                <div class="flex items-center justify-end gap-1">الوقت <i class="fas fa-sort sort-icon"></i></div>
                            </th>
                            <th class="px-5 py-4 text-right text-xs font-bold text-gray-600 uppercase tracking-wider cursor-pointer group" data-sort="status">
                                <div class="flex items-center justify-end gap-1">الحالة <i class="fas fa-sort sort-icon"></i></div>
                            </th>
                            <th class="px-5 py-4 text-right text-xs font-bold text-gray-600 uppercase tracking-wider cursor-pointer group" data-sort="created_at">
                                <div class="flex items-center justify-end gap-1">تاريخ التسجيل <i class="fas fa-sort sort-icon"></i></div>
                            </th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-gray-100 bg-white">
                        <!-- dynamic rows injected here -->
                        <tr class="hover:bg-gray-50">
                            <td colspan="6" class="text-center py-12 text-gray-400">
                                <div class="flex justify-center"><div class="loading-spinner"></div></div>
                                <p class="mt-3">جاري تحميل البيانات...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <!-- Pagination Footer -->
            <div class="bg-gray-50 px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4 border-t border-gray-200">
                <div class="text-sm text-gray-600" id="paginationInfo">عرض 0 - 0 من 0</div>
                <div class="flex gap-2 items-center">
                    <button id="prevPageBtn" class="px-4 py-2 rounded-lg border border-gray-300 bg-white text-gray-600 text-sm font-medium hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed transition"><i class="fas fa-chevron-right ml-1"></i> السابق</button>
                    <span id="pageIndicator" class="px-3 py-1 text-sm font-medium text-gray-700">صفحة 1</span>
                    <button id="nextPageBtn" class="px-4 py-2 rounded-lg border border-gray-300 bg-white text-gray-600 text-sm font-medium hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed transition">التالي <i class="fas fa-chevron-left mr-1"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ------------------- SUPABASE CONFIG ------------------
        const SUPABASE_URL = 'https://ncqvzpcqotdiwjqbwlwp.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_98lfpU1zaqG-MNxkhlvg6g_KEMPMPbS';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Global state
        let allAppointments = [];       // raw data from DB
        let filteredAppointments = [];
        let currentPage = 1;
        let rowsPerPage = 10;
        let sortColumn = 'appointment_date';
        let sortDirection = 'asc';      // asc / desc
        let searchTerm = '';
        let statusFilter = 'all';
        
        // DOM elements
        const tbody = document.getElementById('tableBody');
        const searchInput = document.getElementById('searchInput');
        const statusFilterEl = document.getElementById('statusFilter');
        const rowsPerPageSelect = document.getElementById('rowsPerPageSelect');
        const prevBtn = document.getElementById('prevPageBtn');
        const nextBtn = document.getElementById('nextPageBtn');
        const pageIndicator = document.getElementById('pageIndicator');
        const paginationInfo = document.getElementById('paginationInfo');
        const refreshBtn = document.getElementById('refreshBtn');
        const clearFiltersBtn = document.getElementById('clearFiltersBtn');
        
        // stats elements
        const totalCountSpan = document.getElementById('totalCount');
        const pendingCountSpan = document.getElementById('pendingCount');
        const todayCountSpan = document.getElementById('todayCount');
        const upcomingCountSpan = document.getElementById('upcomingCount');
        
        // Helper: format time (HH:MM:SS) -> 12hr format
        function formatTime(timeStr) {
            if (!timeStr) return '—';
            let [hour, minute] = timeStr.split(':');
            let h = parseInt(hour, 10);
            let ampm = h >= 12 ? 'م' : 'ص';
            h = h % 12 || 12;
            return `${h}:${minute} ${ampm}`;
        }
        
        // Format date to readable (YYYY-MM-DD to DD/MM/YYYY)
        function formatDate(dateStr) {
            if (!dateStr) return '—';
            const parts = dateStr.split('-');
            if(parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
            return dateStr;
        }
        
        // Format created_at timestamp
        function formatDateTime(timestamp) {
            if(!timestamp) return '—';
            const d = new Date(timestamp);
            return d.toLocaleDateString('ar-EG') + ' ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        }
        
        // Get status badge style
        function getStatusBadge(status) {
            const s = (status || 'pending').toLowerCase();
            if(s === 'confirmed') return '<span class="badge inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-green-100 text-green-700"><i class="fas fa-check-circle mr-1 text-xs"></i> مؤكد</span>';
            if(s === 'cancelled') return '<span class="badge inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-red-100 text-red-700"><i class="fas fa-ban mr-1 text-xs"></i> ملغي</span>';
            if(s === 'completed') return '<span class="badge inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-blue-100 text-blue-700"><i class="fas fa-check-double mr-1 text-xs"></i> مكتمل</span>';
            return '<span class="badge inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-yellow-100 text-yellow-700"><i class="fas fa-clock mr-1 text-xs"></i> قيد الانتظار</span>';
        }
        
        // Stats calculation: today (based on appointment_date) & upcoming within 7 days
        function updateStats(appointments) {
            const total = appointments.length;
            const pending = appointments.filter(a => (a.status || 'pending') === 'pending').length;
            const today = new Date().toISOString().slice(0,10);
            const todayCount = appointments.filter(a => a.appointment_date === today).length;
            const sevenDaysLater = new Date();
            sevenDaysLater.setDate(sevenDaysLater.getDate() + 7);
            const upcomingCount = appointments.filter(a => {
                if(!a.appointment_date) return false;
                return a.appointment_date >= today && a.appointment_date <= sevenDaysLater.toISOString().slice(0,10);
            }).length;
            totalCountSpan.innerText = total;
            pendingCountSpan.innerText = pending;
            todayCountSpan.innerText = todayCount;
            upcomingCountSpan.innerText = upcomingCount;
        }
        
        // Sorting logic (client side)
        function sortAppointments(data) {
            return [...data].sort((a,b) => {
                let valA, valB;
                switch(sortColumn) {
                    case 'patient_name': valA = a.patient_name || ''; valB = b.patient_name || ''; break;
                    case 'phone': valA = a.phone || ''; valB = b.phone || ''; break;
                    case 'appointment_date': valA = a.appointment_date || '0000-00-00'; valB = b.appointment_date || '0000-00-00'; break;
                    case 'appointment_time': valA = a.appointment_time || '00:00:00'; valB = b.appointment_time || '00:00:00'; break;
                    case 'status': valA = a.status || ''; valB = b.status || ''; break;
                    case 'created_at': valA = a.created_at ? new Date(a.created_at) : new Date(0); valB = b.created_at ? new Date(b.created_at) : new Date(0); break;
                    default: valA = a[sortColumn] || ''; valB = b[sortColumn] || '';
                }
                if(valA < valB) return sortDirection === 'asc' ? -1 : 1;
                if(valA > valB) return sortDirection === 'asc' ? 1 : -1;
                return 0;
            });
        }
        
        // Apply search & status filter
        function applyFilters() {
            let filtered = [...allAppointments];
            // Search by patient_name or phone (case-insensitive)
            if(searchTerm.trim() !== '') {
                const term = searchTerm.trim().toLowerCase();
                filtered = filtered.filter(app => 
                    (app.patient_name && app.patient_name.toLowerCase().includes(term)) ||
                    (app.phone && app.phone.toLowerCase().includes(term))
                );
            }
            // Status filter
            if(statusFilter !== 'all') {
                filtered = filtered.filter(app => (app.status || 'pending') === statusFilter);
            }
            return filtered;
        }
        
        // Render table with pagination + sorting
        function renderTable() {
            if(!allAppointments.length) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-12 text-gray-400"><i class="fas fa-inbox text-3xl mb-2 block"></i> لا توجد مواعيد مسجلة</td></tr>`;
                paginationInfo.innerText = 'عرض 0 - 0 من 0';
                pageIndicator.innerText = 'صفحة 1';
                prevBtn.disabled = true;
                nextBtn.disabled = true;
                return;
            }
            
            // 1. filter
            filteredAppointments = applyFilters();
            // 2. sort
            const sorted = sortAppointments(filteredAppointments);
            // 3. update stats on the fly based on filtered? But stats shows overall (according to design we keep overall, but stats are computed from original allAppointments)
            updateStats(allAppointments);  // global stats from raw data
            
            const totalFiltered = sorted.length;
            const totalPages = Math.ceil(totalFiltered / rowsPerPage) || 1;
            if(currentPage > totalPages) currentPage = totalPages;
            const startIdx = (currentPage - 1) * rowsPerPage;
            const endIdx = startIdx + rowsPerPage;
            const pageData = sorted.slice(startIdx, endIdx);
            
            // Render rows
            if(pageData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-12 text-gray-400"><i class="fas fa-filter text-2xl mb-2 block"></i> لا توجد نتائج مطابقة للبحث</td></tr>`;
            } else {
                let html = '';
                pageData.forEach(app => {
                    html += `
                        <tr class="border-b border-gray-50 hover:bg-amber-50/30 transition duration-150">
                            <td class="px-5 py-4 text-gray-800 font-medium text-right">${escapeHtml(app.patient_name) || '—'}</td>
                            <td class="px-5 py-4 text-gray-600 text-right dir-ltr" dir="ltr">${escapeHtml(app.phone) || '—'}</td>
                            <td class="px-5 py-4 text-gray-700 text-right">${formatDate(app.appointment_date)}</td>
                            <td class="px-5 py-4 text-gray-700 text-right font-mono">${formatTime(app.appointment_time)}</td>
                            <td class="px-5 py-4 text-right">${getStatusBadge(app.status)}</td>
                            <td class="px-5 py-4 text-gray-500 text-sm text-right">${formatDateTime(app.created_at)}</td>
                        </tr>
                    `;
                });
                tbody.innerHTML = html;
            }
            
            // Pagination UI update
            const startDisplay = totalFiltered === 0 ? 0 : startIdx + 1;
            const endDisplay = Math.min(endIdx, totalFiltered);
            paginationInfo.innerText = `عرض ${startDisplay} - ${endDisplay} من ${totalFiltered}`;
            pageIndicator.innerText = `صفحة ${currentPage} من ${totalPages}`;
            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage === totalPages || totalFiltered === 0;
        }
        
        // Helper to escape HTML
        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }
        
        // Dynamic status filter population (detect unique statuses from DB)
        async function populateStatusOptions() {
            if(!allAppointments.length) return;
            const statusSet = new Set();
            allAppointments.forEach(app => {
                let st = app.status || 'pending';
                statusSet.add(st);
            });
            const currentVal = statusFilterEl.value;
            let optionsHtml = '<option value="all">جميع الحالات</option>';
            for(let st of statusSet) {
                let label = st === 'pending' ? 'قيد الانتظار' : (st === 'confirmed' ? 'مؤكد' : (st === 'cancelled' ? 'ملغي' : (st === 'completed' ? 'مكتمل' : st)));
                optionsHtml += `<option value="${st}">${label}</option>`;
            }
            statusFilterEl.innerHTML = optionsHtml;
            if(currentVal && Array.from(statusSet).includes(currentVal)) statusFilterEl.value = currentVal;
            else statusFilterEl.value = 'all';
            statusFilter = statusFilterEl.value;
        }
        
        // Fetch data from Supabase
        async function fetchAppointments() {
            try {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-12"><div class="loading-spinner mx-auto"></div><p class="mt-3 text-gray-500">جلب البيانات...</p></td></tr>`;
                const { data, error } = await supabase
                    .from('appointments')
                    .select('*')
                    .order('appointment_date', { ascending: true });
                
                if(error) throw error;
                allAppointments = data || [];
                // reset pagination to 1 when new data fetched
                currentPage = 1;
                searchTerm = '';
                statusFilter = 'all';
                if(statusFilterEl) statusFilterEl.value = 'all';
                if(searchInput) searchInput.value = '';
                // Populate status filter dynamically based on fetched data
                await populateStatusOptions();
                // re-apply filtering (clear)
                filteredAppointments = [...allAppointments];
                renderTable();
            } catch (err) {
                console.error('Supabase fetch error:', err);
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-12 text-red-500"><i class="fas fa-exclamation-triangle text-3xl mb-2 block"></i> خطأ في تحميل البيانات: ${err.message}<br><button onclick="location.reload()" class="mt-3 bg-blue-500 text-white px-4 py-2 rounded-lg">إعادة المحاولة</button></td></tr>`;
            }
        }
        
        // Event listeners for sorting (attach after table header render, but dynamic)
        function attachSortListeners() {
            document.querySelectorAll('th[data-sort]').forEach(th => {
                th.removeEventListener('click', sortHandler);
                th.addEventListener('click', sortHandler);
            });
        }
        
        function sortHandler(e) {
            const th = e.currentTarget;
            const column = th.getAttribute('data-sort');
            if(sortColumn === column) {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = column;
                sortDirection = 'asc';
            }
            currentPage = 1;
            renderTable();
            attachSortListeners(); // reattach because render might replace DOM? no, but listeners persist on same th
        }
        
        // search + filter events
        function onSearchChange() {
            searchTerm = searchInput.value;
            currentPage = 1;
            renderTable();
        }
        
        function onStatusChange() {
            statusFilter = statusFilterEl.value;
            currentPage = 1;
            renderTable();
        }
        
        function onRowsPerPageChange() {
            rowsPerPage = parseInt(rowsPerPageSelect.value, 10);
            currentPage = 1;
            renderTable();
        }
        
        function clearFilters() {
            searchInput.value = '';
            statusFilterEl.value = 'all';
            searchTerm = '';
            statusFilter = 'all';
            currentPage = 1;
            renderTable();
        }
        
        function goPrevPage() {
            if(currentPage > 1) {
                currentPage--;
                renderTable();
            }
        }
        
        function goNextPage() {
            const totalFiltered = applyFilters().length;
            const totalPages = Math.ceil(totalFiltered / rowsPerPage);
            if(currentPage < totalPages) {
                currentPage++;
                renderTable();
            }
        }
        
        // Initialize everything
        async function init() {
            await fetchAppointments();
            // set up event listeners
            searchInput.addEventListener('input', onSearchChange);
            statusFilterEl.addEventListener('change', onStatusChange);
            rowsPerPageSelect.addEventListener('change', onRowsPerPageChange);
            clearFiltersBtn.addEventListener('click', clearFilters);
            refreshBtn.addEventListener('click', async () => {
                await fetchAppointments();
                renderTable();
            });
            prevBtn.addEventListener('click', goPrevPage);
            nextBtn.addEventListener('click', goNextPage);
            attachSortListeners();
        }
        
        init();
    </script>
</body>
</html>
