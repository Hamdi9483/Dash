<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة تحكم العيادة | Clinic Dashboard</title>
  <!-- Tailwind CSS + Font Awesome -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: 'Tajawal', 'Segoe UI', sans-serif; background: #f0f4f8; }
    .card { background: white; border-radius: 20px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.02); }
    .sidebar-item { transition: all 0.2s; }
    .sidebar-item:hover, .sidebar-item.active { background: #eef2ff; color: #4f46e5; border-right: 4px solid #4f46e5; }
    .filter-bar { background: white; border-radius: 16px; padding: 1rem; margin-bottom: 1.5rem; }
  </style>
</head>
<body class="text-gray-800">

<!-- شاشة تسجيل الدخول (تظهر قبل المصادقة) -->
<div id="auth-container" class="min-h-screen flex items-center justify-center p-4">
  <div class="card w-full max-w-md p-8">
    <div class="text-center mb-6">
      <i class="fas fa-calendar-check text-4xl text-indigo-600 mb-2"></i>
      <h2 class="text-2xl font-bold">نظام إدارة المواعيد</h2>
      <p class="text-gray-500 mt-1">قم بتسجيل الدخول للمتابعة</p>
    </div>
    <form id="login-form" class="space-y-4">
      <div>
        <label class="block text-sm font-medium mb-1">البريد الإلكتروني</label>
        <input type="email" id="login-email" required class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400 outline-none transition">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">كلمة المرور</label>
        <input type="password" id="login-password" required class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400 outline-none transition">
      </div>
      <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 rounded-xl transition shadow-md">
        <i class="fas fa-sign-in-alt ml-2"></i> دخول
      </button>
    </form>
    <p class="text-center mt-4 text-sm text-gray-500">
      ليس لديك حساب؟ 
      <button id="show-signup" class="text-indigo-600 hover:underline font-medium">إنشاء حساب جديد</button>
    </p>
    <div id="auth-message" class="mt-4 text-sm text-center text-red-500"></div>
  </div>
</div>

<!-- لوحة التحكم الرئيسية (مخفية حتى المصادقة) -->
<div id="dashboard-container" class="hidden min-h-screen flex">
  <!-- الشريط الجانبي -->
  <aside class="w-72 bg-white shadow-xl rounded-l-3xl flex flex-col p-5">
    <div class="flex items-center gap-3 px-3 py-4 border-b border-gray-100">
      <div class="bg-indigo-100 p-2 rounded-xl">
        <i class="fas fa-hospital-user text-indigo-600 text-xl"></i>
      </div>
      <div>
        <h1 class="font-bold text-lg">عيادتي</h1>
        <p class="text-xs text-gray-500" id="user-email-display"></p>
      </div>
    </div>
    
    <nav class="flex-1 mt-6 space-y-1">
      <div class="sidebar-item active flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer" data-page="appointments">
        <i class="fas fa-list-ul w-5"></i>
        <span>المواعيد</span>
      </div>
      <div class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer" data-page="register">
        <i class="fas fa-plus-circle w-5"></i>
        <span>تسجيل موعد</span>
      </div>
      <div class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer" data-page="settings">
        <i class="fas fa-cog w-5"></i>
        <span>إعدادات العيادة</span>
      </div>
    </nav>
    
    <div class="pt-4 border-t border-gray-100">
      <button id="logout-btn" class="w-full flex items-center gap-2 px-4 py-3 text-red-500 hover:bg-red-50 rounded-xl transition">
        <i class="fas fa-sign-out-alt"></i>
        <span>تسجيل الخروج</span>
      </button>
    </div>
  </aside>

  <!-- المحتوى الرئيسي -->
  <main class="flex-1 p-8 overflow-y-auto max-h-screen">
    <!-- الصفحة 1: عرض المواعيد مع فلاتر -->
    <div id="page-appointments" class="page-content">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold"><i class="fas fa-calendar-alt text-indigo-500 ml-2"></i>المواعيد</h2>
        <button id="refresh-appointments" class="bg-white px-4 py-2 rounded-xl shadow-sm hover:shadow transition">
          <i class="fas fa-sync-alt ml-1"></i> تحديث
        </button>
      </div>
      
      <!-- فلاتر -->
      <div class="filter-bar flex flex-wrap gap-4 items-end">
        <div>
          <label class="block text-sm font-medium mb-1">من تاريخ</label>
          <input type="date" id="filter-date-from" class="border border-gray-200 rounded-lg px-3 py-2 focus:ring-1 focus:ring-indigo-300">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">إلى تاريخ</label>
          <input type="date" id="filter-date-to" class="border border-gray-200 rounded-lg px-3 py-2 focus:ring-1 focus:ring-indigo-300">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">الحالة</label>
          <select id="filter-status" class="border border-gray-200 rounded-lg px-3 py-2 focus:ring-1 focus:ring-indigo-300">
            <option value="">الكل</option>
            <option value="pending">قيد الانتظار</option>
            <option value="confirmed">مؤكد</option>
            <option value="cancelled">ملغي</option>
          </select>
        </div>
        <button id="apply-filters" class="bg-indigo-100 text-indigo-700 px-5 py-2 rounded-lg hover:bg-indigo-200 transition">
          <i class="fas fa-filter ml-1"></i> تطبيق
        </button>
        <button id="clear-filters" class="text-gray-500 hover:text-gray-700 px-3 py-2">
          مسح الفلاتر
        </button>
      </div>
      
      <!-- جدول المواعيد -->
      <div class="card overflow-x-auto p-0">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 border-b border-gray-100">
            <tr>
              <th class="px-6 py-4 text-right">المريض</th>
              <th class="px-6 py-4 text-right">الهاتف</th>
              <th class="px-6 py-4 text-right">التاريخ</th>
              <th class="px-6 py-4 text-right">الوقت</th>
              <th class="px-6 py-4 text-right">الحالة</th>
              <th class="px-6 py-4 text-right">إجراءات</th>
            </tr>
          </thead>
          <tbody id="appointments-table-body">
            <tr><td colspan="6" class="text-center py-8 text-gray-400">جاري التحميل...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- الصفحة 2: تسجيل موعد جديد -->
    <div id="page-register" class="page-content hidden">
      <h2 class="text-2xl font-bold mb-6"><i class="fas fa-plus-circle text-indigo-500 ml-2"></i>تسجيل موعد جديد</h2>
      
      <div class="card max-w-2xl p-6">
        <form id="appointment-form" class="space-y-5">
          <div>
            <label class="block font-medium mb-1">اسم المريض <span class="text-red-500">*</span></label>
            <input type="text" id="patient-name" required class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-200">
          </div>
          <div>
            <label class="block font-medium mb-1">رقم الهاتف <span class="text-red-500">*</span></label>
            <input type="tel" id="patient-phone" required class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-200" dir="ltr">
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block font-medium mb-1">التاريخ <span class="text-red-500">*</span></label>
              <input type="date" id="appointment-date" required class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-200">
            </div>
            <div>
              <label class="block font-medium mb-1">الوقت <span class="text-red-500">*</span></label>
              <input type="time" id="appointment-time" required class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-200">
            </div>
          </div>
          <div id="validation-message" class="text-sm text-red-500 bg-red-50 p-3 rounded-lg hidden"></div>
          <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl font-medium transition shadow-md">
            <i class="fas fa-save ml-2"></i> حفظ الموعد
          </button>
        </form>
      </div>
    </div>

    <!-- الصفحة 3: إعدادات العيادة (القيود) -->
    <div id="page-settings" class="page-content hidden">
      <h2 class="text-2xl font-bold mb-6"><i class="fas fa-cog text-indigo-500 ml-2"></i>إعدادات العيادة</h2>
      
      <div class="card max-w-2xl p-6">
        <form id="settings-form" class="space-y-6">
          <!-- أيام العمل المسموحة -->
          <div>
            <label class="block font-medium mb-2">أيام العمل المسموحة</label>
            <div class="grid grid-cols-7 gap-2">
              <label class="flex items-center gap-1"><input type="checkbox" value="0" class="allowed-day"> الأحد</label>
              <label class="flex items-center gap-1"><input type="checkbox" value="1" class="allowed-day"> الإثنين</label>
              <label class="flex items-center gap-1"><input type="checkbox" value="2" class="allowed-day"> الثلاثاء</label>
              <label class="flex items-center gap-1"><input type="checkbox" value="3" class="allowed-day"> الأربعاء</label>
              <label class="flex items-center gap-1"><input type="checkbox" value="4" class="allowed-day"> الخميس</label>
              <label class="flex items-center gap-1"><input type="checkbox" value="5" class="allowed-day"> الجمعة</label>
              <label class="flex items-center gap-1"><input type="checkbox" value="6" class="allowed-day"> السبت</label>
            </div>
          </div>
          
          <!-- ساعات العمل -->
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block font-medium mb-1">بداية الدوام</label>
              <input type="time" id="work-start" class="w-full px-4 py-3 border border-gray-200 rounded-xl">
            </div>
            <div>
              <label class="block font-medium mb-1">نهاية الدوام</label>
              <input type="time" id="work-end" class="w-full px-4 py-3 border border-gray-200 rounded-xl">
            </div>
          </div>
          
          <!-- التواريخ المحظورة -->
          <div>
            <label class="block font-medium mb-2">التواريخ المحظورة (إجازات)</label>
            <div class="flex gap-2 mb-3">
              <input type="date" id="new-blocked-date" class="flex-1 px-4 py-3 border border-gray-200 rounded-xl">
              <button type="button" id="add-blocked-date" class="bg-gray-100 hover:bg-gray-200 px-4 rounded-xl transition">
                <i class="fas fa-plus"></i>
              </button>
            </div>
            <div id="blocked-dates-list" class="flex flex-wrap gap-2 mt-2"></div>
          </div>
          
          <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl font-medium transition shadow-md">
            <i class="fas fa-check-circle ml-2"></i> حفظ الإعدادات
          </button>
          <div id="settings-message" class="text-sm"></div>
        </form>
      </div>
    </div>
  </main>
</div>

<script>
  // ---------- تهيئة Supabase ----------
  const SUPABASE_URL = 'https://ncqvzpcqotdiwjqbwlwp.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_98lfpU1zaqG-MNxkhlvg6g_KEMPMPbS';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ---------- المتغيرات العامة ----------
  let currentUser = null;
  let clinicSettings = null; // تخزين إعدادات العيادة الحالية

  // عناصر DOM
  const authContainer = document.getElementById('auth-container');
  const dashboardContainer = document.getElementById('dashboard-container');
  const loginForm = document.getElementById('login-form');
  const showSignupBtn = document.getElementById('show-signup');
  const authMessage = document.getElementById('auth-message');
  const logoutBtn = document.getElementById('logout-btn');
  const userEmailDisplay = document.getElementById('user-email-display');
  
  // صفحات المحتوى
  const pages = {
    appointments: document.getElementById('page-appointments'),
    register: document.getElementById('page-register'),
    settings: document.getElementById('page-settings')
  };
  
  // عناصر التنقل
  const sidebarItems = document.querySelectorAll('.sidebar-item');
  
  // ---------- وظائف المصادقة ----------
  async function checkSession() {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      currentUser = session.user;
      showDashboard();
    } else {
      showAuth();
    }
  }

  function showAuth() {
    authContainer.classList.remove('hidden');
    dashboardContainer.classList.add('hidden');
  }

  function showDashboard() {
    authContainer.classList.add('hidden');
    dashboardContainer.classList.remove('hidden');
    if (currentUser) {
      userEmailDisplay.textContent = currentUser.email;
    }
    // تحميل الإعدادات العامة مرة واحدة
    loadClinicSettings();
    // عرض صفحة المواعيد افتراضياً
    switchPage('appointments');
  }

  // تسجيل الدخول
  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) {
      authMessage.textContent = 'خطأ في البريد الإلكتروني أو كلمة المرور';
    } else {
      currentUser = data.user;
      showDashboard();
    }
  });

  // عرض نموذج التسجيل (مبسط)
  showSignupBtn.addEventListener('click', async () => {
    const email = prompt('أدخل البريد الإلكتروني للتسجيل:');
    if (!email) return;
    const password = prompt('أدخل كلمة المرور (6 أحرف على الأقل):');
    if (!password) return;
    
    const { data, error } = await supabase.auth.signUp({ email, password });
    if (error) {
      alert('خطأ في التسجيل: ' + error.message);
    } else {
      alert('تم إنشاء الحساب! يمكنك الآن تسجيل الدخول.');
      // سيتم إنشاء ملف شخصي تلقائياً عبر trigger (افترضنا وجوده)
    }
  });

  // تسجيل الخروج
  logoutBtn.addEventListener('click', async () => {
    await supabase.auth.signOut();
    currentUser = null;
    showAuth();
  });

  // ---------- التنقل بين الصفحات ----------
  function switchPage(pageId) {
    // إخفاء جميع الصفحات
    Object.values(pages).forEach(p => p.classList.add('hidden'));
    // إظهار الصفحة المطلوبة
    pages[pageId].classList.remove('hidden');
    
    // تحديث حالة الشريط الجانبي
    sidebarItems.forEach(item => {
      const page = item.dataset.page;
      if (page === pageId) {
        item.classList.add('active');
      } else {
        item.classList.remove('active');
      }
    });
    
    // تحميل بيانات الصفحة
    if (pageId === 'appointments') {
      loadAppointments();
    } else if (pageId === 'settings') {
      populateSettingsForm();
    }
  }

  sidebarItems.forEach(item => {
    item.addEventListener('click', () => {
      const page = item.dataset.page;
      if (page) switchPage(page);
    });
  });

  // ---------- تحميل إعدادات العيادة ----------
  async function loadClinicSettings() {
    const { data, error } = await supabase
      .from('clinic_settings')
      .select('*')
      .eq('id', 1)
      .single();
      
    if (data) {
      clinicSettings = data;
    } else {
      // إنشاء صف افتراضي إذا لم يوجد
      const defaultSettings = {
        id: 1,
        allowed_days: [0,1,2,3,4], // الأحد إلى الخميس
        blocked_dates: [],
        work_start: '09:00:00',
        work_end: '17:00:00'
      };
      await supabase.from('clinic_settings').upsert(defaultSettings);
      clinicSettings = defaultSettings;
    }
  }

  // ---------- الصفحة 1: المواعيد ----------
  async function loadAppointments() {
    const tbody = document.getElementById('appointments-table-body');
    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-gray-400">جاري التحميل...</td></tr>';
    
    let query = supabase.from('appointments').select('*').order('appointment_date', { ascending: true });
    
    // تطبيق الفلاتر
    const dateFrom = document.getElementById('filter-date-from').value;
    const dateTo = document.getElementById('filter-date-to').value;
    const status = document.getElementById('filter-status').value;
    
    if (dateFrom) query = query.gte('appointment_date', dateFrom);
    if (dateTo) query = query.lte('appointment_date', dateTo);
    if (status) query = query.eq('status', status);
    
    const { data: appointments, error } = await query;
    
    if (error) {
      tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-red-500">حدث خطأ في التحميل</td></tr>';
      return;
    }
    
    if (!appointments || appointments.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-gray-400">لا توجد مواعيد</td></tr>';
      return;
    }
    
    tbody.innerHTML = appointments.map(apt => {
      const statusBadge = {
        pending: '<span class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full text-xs">قيد الانتظار</span>',
        confirmed: '<span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs">مؤكد</span>',
        cancelled: '<span class="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs">ملغي</span>'
      }[apt.status] || apt.status;
      
      return `
        <tr class="border-b border-gray-50 hover:bg-gray-50/50">
          <td class="px-6 py-4 font-medium">${apt.patient_name}</td>
          <td class="px-6 py-4" dir="ltr">${apt.phone}</td>
          <td class="px-6 py-4">${apt.appointment_date}</td>
          <td class="px-6 py-4">${apt.appointment_time?.substring(0,5)}</td>
          <td class="px-6 py-4">${statusBadge}</td>
          <td class="px-6 py-4">
            <select class="status-selector text-sm border rounded-lg px-2 py-1" data-id="${apt.id}">
              <option value="pending" ${apt.status === 'pending' ? 'selected' : ''}>قيد الانتظار</option>
              <option value="confirmed" ${apt.status === 'confirmed' ? 'selected' : ''}>مؤكد</option>
              <option value="cancelled" ${apt.status === 'cancelled' ? 'selected' : ''}>ملغي</option>
            </select>
          </td>
        </tr>
      `;
    }).join('');
    
    // إضافة مستمعات تغيير الحالة
    document.querySelectorAll('.status-selector').forEach(select => {
      select.addEventListener('change', async (e) => {
        const id = e.target.dataset.id;
        const newStatus = e.target.value;
        const { error } = await supabase.from('appointments').update({ status: newStatus }).eq('id', id);
        if (!error) {
          // تحديث الصف بصرياً (يمكن إعادة تحميل الجدول)
          loadAppointments();
        }
      });
    });
  }

  document.getElementById('apply-filters').addEventListener('click', loadAppointments);
  document.getElementById('clear-filters').addEventListener('click', () => {
    document.getElementById('filter-date-from').value = '';
    document.getElementById('filter-date-to').value = '';
    document.getElementById('filter-status').value = '';
    loadAppointments();
  });
  document.getElementById('refresh-appointments').addEventListener('click', loadAppointments);

  // ---------- الصفحة 2: تسجيل موعد ----------
  const appointmentForm = document.getElementById('appointment-form');
  const validationMsg = document.getElementById('validation-message');

  // التحقق من صحة الموعد بناءً على الإعدادات
  function validateAppointment(dateStr, timeStr) {
    if (!clinicSettings) return { valid: false, message: 'لم يتم تحميل الإعدادات بعد' };
    
    const appointmentDate = new Date(dateStr + 'T' + timeStr);
    const dayOfWeek = appointmentDate.getDay(); // 0 = الأحد في JS
    
    // التحقق من اليوم المسموح
    if (!clinicSettings.allowed_days.includes(dayOfWeek)) {
      return { valid: false, message: 'هذا اليوم ليس ضمن أيام العمل المسموحة' };
    }
    
    // التحقق من التاريخ المحظور
    if (clinicSettings.blocked_dates.includes(dateStr)) {
      return { valid: false, message: 'هذا التاريخ محظور (إجازة)' };
    }
    
    // التحقق من الوقت ضمن ساعات العمل
    const timeValue = timeStr; // "HH:MM"
    const workStart = clinicSettings.work_start?.substring(0,5);
    const workEnd = clinicSettings.work_end?.substring(0,5);
    
    if (timeValue < workStart || timeValue > workEnd) {
      return { valid: false, message: `الوقت يجب أن يكون بين ${workStart} و ${workEnd}` };
    }
    
    return { valid: true };
  }

  appointmentForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const patientName = document.getElementById('patient-name').value.trim();
    const phone = document.getElementById('patient-phone').value.trim();
    const date = document.getElementById('appointment-date').value;
    const time = document.getElementById('appointment-time').value;
    
    if (!clinicSettings) {
      validationMsg.textContent = 'الرجاء الانتظار حتى تحميل الإعدادات';
      validationMsg.classList.remove('hidden');
      return;
    }
    
    const validation = validateAppointment(date, time);
    if (!validation.valid) {
      validationMsg.textContent = validation.message;
      validationMsg.classList.remove('hidden');
      return;
    }
    
    validationMsg.classList.add('hidden');
    
    const { data, error } = await supabase.from('appointments').insert([{
      patient_name: patientName,
      phone: phone,
      appointment_date: date,
      appointment_time: time,
      status: 'pending'
    }]);
    
    if (error) {
      validationMsg.textContent = 'حدث خطأ أثناء الحفظ: ' + error.message;
      validationMsg.classList.remove('hidden');
    } else {
      alert('تم تسجيل الموعد بنجاح');
      appointmentForm.reset();
      switchPage('appointments'); // العودة لصفحة المواعيد
    }
  });

  // ---------- الصفحة 3: الإعدادات ----------
  function populateSettingsForm() {
    if (!clinicSettings) return;
    
    // أيام العمل
    document.querySelectorAll('.allowed-day').forEach(cb => {
      cb.checked = clinicSettings.allowed_days.includes(parseInt(cb.value));
    });
    
    // ساعات العمل
    document.getElementById('work-start').value = clinicSettings.work_start?.substring(0,5) || '09:00';
    document.getElementById('work-end').value = clinicSettings.work_end?.substring(0,5) || '17:00';
    
    // التواريخ المحظورة
    renderBlockedDatesList();
  }
  
  function renderBlockedDatesList() {
    const container = document.getElementById('blocked-dates-list');
    const dates = clinicSettings.blocked_dates || [];
    container.innerHTML = dates.map(date => `
      <span class="bg-gray-100 px-3 py-1 rounded-full text-sm flex items-center gap-2">
        ${date}
        <button type="button" class="remove-blocked-date text-red-400 hover:text-red-600" data-date="${date}">
          <i class="fas fa-times"></i>
        </button>
      </span>
    `).join('');
    
    // إضافة مستمعات الحذف
    document.querySelectorAll('.remove-blocked-date').forEach(btn => {
      btn.addEventListener('click', () => {
        const dateToRemove = btn.dataset.date;
        clinicSettings.blocked_dates = clinicSettings.blocked_dates.filter(d => d !== dateToRemove);
        renderBlockedDatesList();
      });
    });
  }
  
  document.getElementById('add-blocked-date').addEventListener('click', () => {
    const input = document.getElementById('new-blocked-date');
    const date = input.value;
    if (!date) return;
    if (!clinicSettings.blocked_dates.includes(date)) {
      clinicSettings.blocked_dates.push(date);
      renderBlockedDatesList();
    }
    input.value = '';
  });
  
  document.getElementById('settings-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const allowedDays = Array.from(document.querySelectorAll('.allowed-day:checked')).map(cb => parseInt(cb.value));
    const workStart = document.getElementById('work-start').value + ':00';
    const workEnd = document.getElementById('work-end').value + ':00';
    
    const updates = {
      allowed_days: allowedDays,
      work_start: workStart,
      work_end: workEnd,
      blocked_dates: clinicSettings.blocked_dates
    };
    
    const { error } = await supabase.from('clinic_settings').update(updates).eq('id', 1);
    const msgDiv = document.getElementById('settings-message');
    
    if (error) {
      msgDiv.innerHTML = `<span class="text-red-500">خطأ: ${error.message}</span>`;
    } else {
      msgDiv.innerHTML = `<span class="text-green-600"><i class="fas fa-check-circle ml-1"></i>تم حفظ الإعدادات بنجاح</span>`;
      await loadClinicSettings(); // إعادة تحميل
    }
  });

  // ---------- بدء التطبيق ----------
  checkSession();
</script>
</body>
</html>
