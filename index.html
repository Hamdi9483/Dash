<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏥 لوحة تحكم العيادة</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --primary: #4f46e5; --primary-hover: #4338ca;
      --secondary: #64748b; --success: #22c55e;
      --warning: #f59e0b; --danger: #ef4444;
      --bg-light: #f8fafc; --card-bg: #ffffff;
      --text-dark: #1e293b; --text-light: #64748b;
      --border: #e2e8f0; --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { direction: rtl; background: var(--bg-light); color: var(--text-dark); line-height: 1.6; }
    
    .navbar { background: linear-gradient(135deg, var(--primary), #7c3aed); padding: 1rem 2rem; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; }
    .nav-container { max-width: 1200px; margin: auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
    .logo { color: white; font-size: 1.5rem; font-weight: bold; display: flex; align-items: center; gap: 0.5rem; }
    .nav-links { display: flex; gap: 0.5rem; list-style: none; flex-wrap: wrap; }
    .nav-links button { background: none; border: none; color: rgba(255,255,255,0.9); padding: 0.5rem 1rem; border-radius: var(--radius); cursor: pointer; transition: all 0.3s; font-size: 1rem; }
    .nav-links button:hover, .nav-links button.active { background: rgba(255,255,255,0.2); color: white; }
    
    .container { max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; }
    .page { display: none; animation: fadeIn 0.3s ease-out; }
    .page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.5rem; margin-bottom: 1.5rem; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 0.5rem; }
    .card-title { font-size: 1.25rem; font-weight: 600; color: var(--text-dark); }
    
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-dark); }
    .form-control { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; transition: border-color 0.3s; background: white; }
    .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
    
    .btn { padding: 0.75rem 1.5rem; border: none; border-radius: 8px; font-weight: 500; cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; gap: 0.5rem; font-size: 1rem; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
    .btn-secondary { background: var(--secondary); color: white; }
    .btn-success { background: var(--success); color: white; }
    .btn-warning { background: var(--warning); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    
    .filters { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; padding: 1rem; background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); align-items: flex-end; }
    
    .table-container { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    th, td { padding: 1rem; text-align: right; border-bottom: 1px solid var(--border); }
    th { background: var(--bg-light); font-weight: 600; color: var(--text-light); white-space: nowrap; }
    tr:hover { background: var(--bg-light); }
    .status-badge { padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.875rem; font-weight: 500; }
    .status-pending { background: #fef3c7; color: #92400e; }
    .status-confirmed { background: #dcfce7; color: #166534; }
    .status-cancelled { background: #fee2e2; color: #991b1b; }
    
    .days-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 0.75rem; }
    .day-checkbox { display: flex; align-items: center; gap: 0.5rem; padding: 0.75rem; background: var(--bg-light); border-radius: 8px; cursor: pointer; transition: all 0.3s; user-select: none; }
    .day-checkbox input { cursor: pointer; transform: scale(1.2); }
    .day-checkbox:hover { background: var(--border); }
    .day-checkbox.checked { background: var(--primary); color: white; }
    
    .blocked-dates-list { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem; }
    .blocked-tag { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background: var(--danger); color: white; border-radius: 20px; font-size: 0.875rem; }
    .blocked-tag button { background: none; border: none; color: white; cursor: pointer; font-size: 1.2rem; line-height: 1; padding: 0; }
    
    .alert { padding: 1rem; border-radius: 8px; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.75rem; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    .alert-success { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
    .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    
    .loading { text-align: center; padding: 2rem; color: var(--text-light); }
    .empty-state { text-align: center; padding: 3rem; color: var(--text-light); }
    
    @media (max-width: 768px) {
      .nav-container { flex-direction: column; align-items: stretch; }
      .nav-links { justify-content: center; }
      .filters { flex-direction: column; align-items: stretch; }
      .form-grid { grid-template-columns: 1fr; }
      .card-header { flex-direction: column; align-items: flex-start; }
      table { font-size: 0.9rem; }
      th, td { padding: 0.75rem 0.5rem; }
    }
    
    .text-center { text-align: center; }
    .mt-1 { margin-top: 1rem; }
    .mb-1 { margin-bottom: 1rem; }
    .flex { display: flex; gap: 1rem; flex-wrap: wrap; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">🏥 عيادتي</div>
      <ul class="nav-links">
        <li><button onclick="showPage('appointments')" class="active" data-page="appointments">📋 المواعيد</button></li>
        <li><button onclick="showPage('register')" data-page="register">➕ تسجيل جديد</button></li>
        <li><button onclick="showPage('settings')" data-page="settings">⚙️ الإعدادات</button></li>
      </ul>
    </div>
  </nav>

  <!-- 📋 صفحة المواعيد -->
  <div id="page-appointments" class="container page active">
    <div class="card">
      <div class="card-header">
        <h2 class="card-title">📅 قائمة المواعيد</h2>
        <button class="btn btn-primary" onclick="loadAppointments()">🔄 تحديث</button>
      </div>

      <div class="filters">
        <div class="form-group" style="margin:0;flex:1;min-width:150px">
          <label style="font-size:0.9rem">من تاريخ</label>
          <input type="date" id="filter-from" class="form-control" style="padding:0.5rem">
        </div>
        <div class="form-group" style="margin:0;flex:1;min-width:150px">
          <label style="font-size:0.9rem">إلى تاريخ</label>
          <input type="date" id="filter-to" class="form-control" style="padding:0.5rem">
        </div>
        <div class="form-group" style="margin:0;flex:1;min-width:150px">
          <label style="font-size:0.9rem">الحالة</label>
          <select id="filter-status" class="form-control" style="padding:0.5rem">
            <option value="">الكل</option>
            <option value="pending">قيد الانتظار</option>
            <option value="confirmed">مؤكد</option>
            <option value="cancelled">ملغي</option>
          </select>
        </div>
        <button class="btn btn-secondary" onclick="applyFilters()">🔍 بحث</button>
        <button class="btn btn-danger" onclick="clearFilters()" style="background:#94a3b8">🗑️ مسح</button>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>المريض</th><th>الهاتف</th><th>التاريخ</th><th>الوقت</th><th>الحالة</th><th>إجراءات</th>
            </tr>
          </thead>
          <tbody id="appointments-body">
            <tr><td colspan="6" class="loading">جاري التحميل...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ➕ صفحة التسجيل -->
  <div id="page-register" class="container page">
    <div class="card">
      <div class="card-header"><h2 class="card-title">📝 تسجيل موعد جديد</h2></div>
      <div id="alert-register"></div>
      <form id="appointment-form">
        <div class="form-grid">
          <div class="form-group">
            <label>اسم المريض *</label>
            <input type="text" id="patient-name" class="form-control" required placeholder="أدخل الاسم الكامل">
          </div>
          <div class="form-group">
            <label>رقم الهاتف *</label>
            <input type="tel" id="phone" class="form-control" required pattern="^05[0-9]{8}$" placeholder="05XXXXXXXX">
            <small style="color:var(--text-light)">مثال: 0512345678</small>
          </div>
          <div class="form-group">
            <label>تاريخ الموعد *</label>
            <input type="date" id="appointment-date" class="form-control" required>
          </div>
          <div class="form-group">
            <label>وقت الموعد *</label>
            <input type="time" id="appointment-time" class="form-control" required>
            <small id="time-hint" style="color:var(--text-light)"></small>
          </div>
        </div>
        <div class="flex mt-1">
          <button type="submit" class="btn btn-success">💾 حفظ الموعد</button>
          <button type="button" class="btn btn-secondary" onclick="document.getElementById('appointment-form').reset()">🔄 مسح</button>
        </div>
      </form>
    </div>

    <div class="card">
      <h3 style="margin-bottom:1rem">⚙️ قيود المواعيد النشطة</h3>
      <div id="settings-preview" class="text-center" style="color:var(--text-light);padding:1rem">جاري تحميل الإعدادات...</div>
    </div>
  </div>

  <!-- ⚙️ صفحة الإعدادات -->
  <div id="page-settings" class="container page">
    <div class="card">
      <div class="card-header"><h2 class="card-title">🕐 ساعات الدوام</h2></div>
      <form id="hours-form" class="form-grid">
        <div class="form-group">
          <label>بداية الدوام</label>
          <input type="time" id="work-start" class="form-control" required>
        </div>
        <div class="form-group">
          <label>نهاية الدوام</label>
          <input type="time" id="work-end" class="form-control" required>
        </div>
        <div class="form-group" style="align-self:flex-end">
          <button type="submit" class="btn btn-primary">💾 حفظ</button>
        </div>
      </form>
    </div>

    <div class="card">
      <div class="card-header"><h2 class="card-title">📅 الأيام المسموحة</h2></div>
      <div class="days-grid" id="days-container"></div>
      <div class="mt-1"><button id="save-days" class="btn btn-primary">💾 حفظ الأيام</button></div>
    </div>

    <div class="card">
      <div class="card-header"><h2 class="card-title">🚫 تواريخ محجوزة</h2></div>
      <div class="form-grid" style="align-items:flex-end">
        <div class="form-group" style="flex:2">
          <label>إضافة تاريخ محجوز</label>
          <input type="date" id="blocked-date" class="form-control">
        </div>
        <div class="form-group" style="flex:1">
          <button id="add-blocked" class="btn btn-warning">➕ إضافة</button>
        </div>
      </div>
      <div class="blocked-dates-list" id="blocked-list"></div>
    </div>
  </div>

  <script>
    // ===== 🔧 CONFIGURATION =====
    const SUPABASE_URL = 'https://ncqvzpcqotdiwjqbwlwp.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_98lfpU1zaqG-MNxkhlvg6g_KEMPMPbS';
    
    const WEEK_DAYS = [
      { value: 0, label: 'الأحد' }, { value: 1, label: 'الاثنين' },
      { value: 2, label: 'الثلاثاء' }, { value: 3, label: 'الأربعاء' },
      { value: 4, label: 'الخميس' }, { value: 5, label: 'الجمعة' },
      { value: 6, label: 'السبت' }
    ];

    // ===== 🔌 SUPABASE CLIENT =====
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let clinicSettings = null;

    // ===== 🎨 UTILITIES =====
    function formatTime(timeStr) {
      if (!timeStr) return '';
      const [h, m] = timeStr.split(':');
      const period = h >= 12 ? 'م' : 'ص';
      return `${h % 12 || 12}:${m} ${period}`;
    }
    
    function formatDate(dateStr) {
      if (!dateStr) return '';
      return new Date(dateStr).toLocaleDateString('ar-SA', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    }
    
    function showAlert(containerId, message, type = 'success') {
      const container = document.getElementById(containerId);
      if (!container) { alert(`${type==='success'?'✅':'❌'} ${message}`); return; }
      const alert = document.createElement('div');
      alert.className = `alert alert-${type}`;
      alert.innerHTML = `<span>${type === 'success' ? '✓' : '✕'}</span> ${message}`;
      container.appendChild(alert);
      setTimeout(() => alert.remove(), 5000);
    }
    
    function getStatusLabel(status) {
      return { pending: 'قيد الانتظار', confirmed: 'مؤكد', cancelled: 'ملغي' }[status] || status;
    }

    // ===== 🔄 PAGE NAVIGATION =====
    function showPage(pageName) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-links button').forEach(b => b.classList.remove('active'));
      document.getElementById(`page-${pageName}`).classList.add('active');
      document.querySelector(`[data-page="${pageName}"]`)?.classList.add('active');
      
      if (pageName === 'appointments') loadAppointments();
      if (pageName === 'register') { loadSettings(); updateTimeConstraints(); }
      if (pageName === 'settings') loadClinicSettings();
    }

    // ===== 📋 APPOINTMENTS PAGE =====
    async function loadAppointments(filters = {}) {
      const tbody = document.getElementById('appointments-body');
      tbody.innerHTML = '<tr><td colspan="6" class="loading">جاري التحميل...</td></tr>';
      
      try {
        let query = supabase.from('appointments').select('*').order('appointment_date', { ascending: true }).order('appointment_time', { ascending: true });
        if (filters.from) query = query.gte('appointment_date', filters.from);
        if (filters.to) query = query.lte('appointment_date', filters.to);
        if (filters.status) query = query.eq('status', filters.status);
        
        const { data, error } = await query;
        if (error) throw error;
        
        if (!data?.length) {
          tbody.innerHTML = `<tr><td colspan="6" class="empty-state">📭 لا توجد مواعيد مطابقة</td></tr>`;
          return;
        }
        
        tbody.innerHTML = data.map(apt => `
          <tr>
            <td><strong>${apt.patient_name}</strong></td>
            <td>${apt.phone}</td>
            <td>${formatDate(apt.appointment_date)}</td>
            <td>${formatTime(apt.appointment_time)}</td>
            <td><span class="status-badge status-${apt.status}">${getStatusLabel(apt.status)}</span></td>
            <td>
              <button class="btn btn-warning" style="padding:0.3rem 0.6rem;font-size:0.8rem" onclick="updateStatus('${apt.id}', 'confirmed')">✓</button>
              <button class="btn btn-danger" style="padding:0.3rem 0.6rem;font-size:0.8rem" onclick="updateStatus('${apt.id}', 'cancelled')">✕</button>
            </td>
          </tr>
        `).join('');
      } catch (err) {
        console.error('Load error:', err);
        tbody.innerHTML = `<tr><td colspan="6" class="empty-state" style="color:var(--danger)">❌ ${err.message}</td></tr>`;
      }
    }
    
    async function updateStatus(id, newStatus) {
      if (!confirm(`تغيير الحالة إلى "${getStatusLabel(newStatus)}"؟`)) return;
      try {
        const { error } = await supabase.from('appointments').update({ status: newStatus }).eq('id', id);
        if (error) throw error;
        showAlert('appointments-body', '✅ تم التحديث', 'success');
        loadAppointments(getCurrentFilters());
      } catch (err) {
        showAlert('appointments-body', `❌ ${err.message}`, 'error');
      }
    }
    
    function applyFilters() {
      loadAppointments(getCurrentFilters());
    }
    
    function clearFilters() {
      document.getElementById('filter-from').value = '';
      document.getElementById('filter-to').value = '';
      document.getElementById('filter-status').value = '';
      loadAppointments();
    }
    
    function getCurrentFilters() {
      return {
        from: document.getElementById('filter-from').value,
        to: document.getElementById('filter-to').value,
        status: document.getElementById('filter-status').value
      };
    }

    // ===== ➕ REGISTER PAGE =====
    async function loadSettings() {
      try {
        const { data, error } = await supabase.from('clinic_settings').select('*').single();
        if (error) throw error;
        clinicSettings = data;
        updateSettingsPreview();
        updateTimeConstraints();
      } catch (err) { console.error('Settings error:', err); }
    }
    
    function updateSettingsPreview() {
      const preview = document.getElementById('settings-preview');
      if (!clinicSettings) return;
      const days = clinicSettings.allowed_days?.map(d => WEEK_DAYS.find(w => w.value === d)?.label).filter(Boolean).join('، ') || 'جميع الأيام';
      preview.innerHTML = `
        <p><strong>🕐 ساعات العمل:</strong> ${formatTime(clinicSettings.work_start)} - ${formatTime(clinicSettings.work_end)}</p>
        <p><strong>📅 الأيام:</strong> ${days}</p>
        <p><strong>🚫 محجوز:</strong> ${clinicSettings.blocked_dates?.length || 0} تواريخ</p>
      `;
    }
    
    function updateTimeConstraints() {
      const timeInput = document.getElementById('appointment-time');
      const hint = document.getElementById('time-hint');
      const dateInput = document.getElementById('appointment-date');
      
      if (!clinicSettings) return;
      timeInput.min = clinicSettings.work_start;
      timeInput.max = clinicSettings.work_end;
      hint.textContent = `الوقت: ${formatTime(clinicSettings.work_start)} - ${formatTime(clinicSettings.work_end)}`;
      
      dateInput.onchange = (e) => {
        const date = e.target.value;
        if (!date) return;
        const day = new Date(date).getDay();
        
        if (clinicSettings.allowed_days && !clinicSettings.allowed_days.includes(day)) {
          showAlert('alert-register', `⚠️ ${WEEK_DAYS[day].label} غير متاح`, 'error');
          e.target.value = '';
          return;
        }
        if (clinicSettings.blocked_dates?.includes(date)) {
          showAlert('alert-register', '⚠️ هذا التاريخ محجوز', 'error');
          e.target.value = '';
        }
      };
    }
    
    document.getElementById('appointment-form')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const apt = {
        patient_name: document.getElementById('patient-name').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        appointment_date: document.getElementById('appointment-date').value,
        appointment_time: document.getElementById('appointment-time').value,
        status: 'pending'
      };
      
      const day = new Date(apt.appointment_date).getDay();
      if (clinicSettings?.allowed_days && !clinicSettings.allowed_days.includes(day)) {
        showAlert('alert-register', '❌ اليوم غير متاح', 'error');
        return;
      }
      if (clinicSettings?.blocked_dates?.includes(apt.appointment_date)) {
        showAlert('alert-register', '❌ التاريخ محجوز', 'error');
        return;
      }
      if (apt.appointment_time < clinicSettings?.work_start || apt.appointment_time > clinicSettings?.work_end) {
        showAlert('alert-register', '❌ الوقت خارج الدوام', 'error');
        return;
      }
      
      try {
        const { error } = await supabase.from('appointments').insert([apt]);
        if (error) throw error;
        showAlert('alert-register', '✅ تم الحفظ بنجاح!');
        e.target.reset();
        updateTimeConstraints();
      } catch (err) {
        showAlert('alert-register', `❌ ${err.message}`, 'error');
      }
    });

    // ===== ⚙️ SETTINGS PAGE =====
    function renderDaysCheckboxes() {
      const container = document.getElementById('days-container');
      if (!container) return;
      container.innerHTML = WEEK_DAYS.map(day => `
        <label class="day-checkbox" data-value="${day.value}">
          <input type="checkbox" value="${day.value}">
          <span>${day.label}</span>
        </label>
      `).join('');
      
      container.querySelectorAll('.day-checkbox').forEach(cb => {
        cb.onclick = (e) => {
          if (e.target.tagName !== 'INPUT') {
            const input = cb.querySelector('input');
            input.checked = !input.checked;
          }
          cb.classList.toggle('checked', cb.querySelector('input').checked);
        };
      });
    }
    
    async function loadClinicSettings() {
      try {
        const { data, error } = await supabase.from('clinic_settings').select('*').single();
        if (error) throw error;
        
        document.getElementById('work-start').value = data.work_start;
        document.getElementById('work-end').value = data.work_end;
        
        document.querySelectorAll('.day-checkbox input').forEach(cb => {
          cb.checked = data.allowed_days?.includes(parseInt(cb.value));
          cb.closest('.day-checkbox').classList.toggle('checked', cb.checked);
        });
        
        renderBlockedDates(data.blocked_dates || []);
      } catch (err) {
        console.error('Settings load error:', err);
      }
    }
    
    function renderBlockedDates(dates) {
      const list = document.getElementById('blocked-list');
      if (!list) return;
      if (!dates.length) {
        list.innerHTML = '<small style="color:var(--text-light)">لا توجد تواريخ محجوزة</small>';
        return;
      }
      list.innerHTML = dates.map(date => `
        <span class="blocked-tag">${formatDate(date)} <button type="button" onclick="removeBlockedDate('${date}')">&times;</button></span>
      `).join('');
    }
    
    document.getElementById('hours-form')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const { error } = await supabase.from('clinic_settings')
          .update({ work_start: document.getElementById('work-start').value, work_end: document.getElementById('work-end').value })
          .eq('id', 1);
        if (error) throw error;
        showAlert('page-settings', '✅ تم حفظ ساعات العمل', 'success');
      } catch (err) {
        showAlert('page-settings', `❌ ${err.message}`, 'error');
      }
    });
    
    document.getElementById('save-days')?.addEventListener('click', async () => {
      const days = Array.from(document.querySelectorAll('.day-checkbox input:checked')).map(cb => parseInt(cb.value));
      try {
        const { error } = await supabase.from('clinic_settings').update({ allowed_days: days }).eq('id', 1);
        if (error) throw error;
        showAlert('page-settings', '✅ تم حفظ الأيام', 'success');
      } catch (err) {
        showAlert('page-settings', `❌ ${err.message}`, 'error');
      }
    });
    
    document.getElementById('add-blocked')?.addEventListener('click', async () => {
      const date = document.getElementById('blocked-date').value;
      if (!date) { showAlert('page-settings', '⚠️ اختر تاريخاً', 'error'); return; }
      
      try {
        const { data: current } = await supabase.from('clinic_settings').select('blocked_dates').single();
        const blocked = current?.blocked_dates || [];
        if (blocked.includes(date)) { showAlert('page-settings', '⚠️ موجود مسبقاً', 'error'); return; }
        
        const { error } = await supabase.from('clinic_settings').update({ blocked_dates: [...blocked, date] }).eq('id', 1);
        if (error) throw error;
        showAlert('page-settings', '✅ تمت الإضافة', 'success');
        loadClinicSettings();
      } catch (err) {
        showAlert('page-settings', `❌ ${err.message}`, 'error');
      }
    });
    
    async function removeBlockedDate(dateToRemove) {
      if (!confirm('إزالة هذا التاريخ؟')) return;
      try {
        const { data: current } = await supabase.from('clinic_settings').select('blocked_dates').single();
        const updated = (current?.blocked_dates || []).filter(d => d !== dateToRemove);
        const { error } = await supabase.from('clinic_settings').update({ blocked_dates: updated }).eq('id', 1);
        if (error) throw error;
        showAlert('page-settings', '✅ تمت الإزالة', 'success');
        loadClinicSettings();
      } catch (err) {
        showAlert('page-settings', `❌ ${err.message}`, 'error');
      }
    }

    // ===== 🚀 INITIALIZATION =====
    document.addEventListener('DOMContentLoaded', async () => {
      const today = new Date().toISOString().split('T')[0];
      document.querySelectorAll('input[type="date"]').forEach(inp => { if (!inp.value) inp.min = today; });
      renderDaysCheckboxes();
      loadAppointments();
      loadSettings();
    });
  </script>
</body>
</html>
