<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>عيادة نور | نظام المواعيد المتكامل</title>
    <!-- Tailwind + Font Awesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* تخصيص التمرير والترانزیشن */
        * { transition: background-color 0.2s ease, border-color 0.2s ease; }
        .dark-transition { transition: background-color 0.3s, color 0.2s; }
        .toast-msg { animation: fadeInUp 0.3s ease forwards; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .rtl { direction: rtl; }
        .ltr { direction: ltr; }
    </style>
</head>
<body class="font-sans antialiased rtl dark-transition bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200">

    <div class="max-w-7xl mx-auto px-4 py-5 md:py-7">
        <!-- Header مع أزرار الوضع الليلي واللغة -->
        <div class="flex flex-wrap justify-between items-center gap-4 mb-6">
            <div class="flex items-center gap-3">
                <div class="bg-emerald-600 dark:bg-emerald-700 p-2.5 rounded-2xl shadow-md">
                    <i class="fas fa-calendar-check text-white text-xl"></i>
                </div>
                <h1 id="mainTitle" class="text-2xl md:text-3xl font-extrabold bg-gradient-to-l from-emerald-700 to-blue-700 bg-clip-text text-transparent">نظام إدارة المواعيد</h1>
            </div>
            <div class="flex gap-3">
                <!-- تبديل الوضع الليلي -->
                <button id="darkModeToggle" class="bg-white dark:bg-gray-800 shadow-md p-2 rounded-full w-10 h-10 flex items-center justify-center hover:scale-105 transition">
                    <i class="fas fa-moon text-gray-700 dark:text-yellow-300 text-lg"></i>
                </button>
                <!-- تبديل اللغة -->
                <button id="langToggle" class="bg-white dark:bg-gray-800 shadow-md px-4 py-2 rounded-full font-semibold flex items-center gap-2">
                    <i class="fas fa-globe"></i> <span id="langText">English</span>
                </button>
            </div>
        </div>

        <!-- تبويبات الصفحتين (بدلاً من 3، صار عندنا صفحتين: المواعيد والقيود) -->
        <div class="flex flex-wrap gap-3 mb-7 border-b border-gray-200 dark:border-gray-700 pb-2">
            <button id="tabAppointmentsBtn" class="tab-btn flex items-center gap-2 px-6 py-2.5 rounded-t-xl font-bold transition-all duration-200 bg-blue-600 text-white shadow">
                <i class="fas fa-calendar-alt"></i> <span data-key="appointmentsTab">المواعيد والإدارة</span>
            </button>
            <button id="tabSettingsBtn" class="tab-btn flex items-center gap-2 px-6 py-2.5 rounded-t-xl font-bold transition-all duration-200 bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300">
                <i class="fas fa-sliders-h"></i> <span data-key="settingsTab">القيود والإعدادات</span>
            </button>
        </div>

        <!-- ========== صفحة المواعيد ========== -->
        <div id="appointmentsPanel" class="tab-panel">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl overflow-hidden border border-gray-100 dark:border-gray-700">
                <div class="bg-gradient-to-r from-blue-700 to-indigo-800 dark:from-blue-900 dark:to-indigo-900 px-5 py-4 flex flex-wrap justify-between items-center gap-3">
                    <div class="flex items-center gap-2 text-white">
                        <i class="fas fa-list-ul text-xl"></i>
                        <h2 class="text-xl font-bold" data-key="appointmentsList">جدول المواعيد</h2>
                    </div>
                    <div class="flex gap-2 flex-wrap">
                        <span class="bg-white/20 text-white text-sm px-3 py-1 rounded-full"><i class="fas fa-chart-line ml-1"></i> <span id="appointmentsCount">0</span> <span data-key="appointment">موعد</span></span>
                        <button id="refreshAppointmentsBtn" class="bg-white/20 hover:bg-white/30 px-3 py-1 rounded-full text-sm"><i class="fas fa-sync-alt ml-1"></i> <span data-key="refresh">تحديث</span></button>
                        <button id="deleteAllBtn" class="bg-red-600/80 hover:bg-red-700 px-3 py-1 rounded-full text-sm text-white"><i class="fas fa-trash-alt ml-1"></i> <span data-key="deleteAll">حذف الكل</span></button>
                        <button id="bulkWhatsappBtn" class="bg-green-600/80 hover:bg-green-700 px-3 py-1 rounded-full text-sm text-white"><i class="fab fa-whatsapp ml-1"></i> <span data-key="sendSelected">إرسال للمحددين</span></button>
                    </div>
                </div>
                <div class="overflow-x-auto p-4">
                    <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
                        <thead class="bg-gray-50 dark:bg-gray-900/50">
                            <tr>
                                <th class="px-3 py-3 text-center text-xs font-medium uppercase tracking-wider"><input type="checkbox" id="selectAllCheckbox" class="w-4 h-4"></th>
                                <th class="px-4 py-3 text-right text-xs font-medium uppercase tracking-wider" data-key="patient">المريض</th>
                                <th class="px-4 py-3 text-right text-xs font-medium uppercase tracking-wider" data-key="phone">الهاتف</th>
                                <th class="px-4 py-3 text-right text-xs font-medium uppercase tracking-wider" data-key="date">التاريخ</th>
                                <th class="px-4 py-3 text-right text-xs font-medium uppercase tracking-wider" data-key="time">الوقت</th>
                                <th class="px-4 py-3 text-right text-xs font-medium uppercase tracking-wider" data-key="status">الحالة</th>
                                <th class="px-4 py-3 text-center text-xs font-medium uppercase tracking-wider" data-key="actions">إجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="appointmentsTableBody" class="bg-white dark:bg-gray-800 divide-y divide-gray-100 dark:divide-gray-700">
                            <tr><td colspan="7" class="text-center py-12 text-gray-400"><i class="fas fa-spinner fa-spin ml-2"></i> جاري التحميل...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- ========== صفحة القيود والإعدادات ========== -->
        <div id="settingsPanel" class="tab-panel hidden">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-6 md:p-8 border border-gray-100 dark:border-gray-700">
                <div class="flex items-center gap-3 border-b border-gray-200 dark:border-gray-700 pb-4 mb-6">
                    <i class="fas fa-gavel text-amber-600 text-xl"></i>
                    <h2 class="text-2xl font-bold" data-key="clinicRules">قيود العيادة وأيام العمل</h2>
                </div>
                <form id="settingsForm" class="space-y-8">
                    <!-- أيام العمل -->
                    <div>
                        <label class="block font-semibold mb-3"><i class="fas fa-calendar-week ml-1"></i> <span data-key="workDays">أيام العمل (اختر الأيام المتاحة)</span></label>
                        <div class="grid grid-cols-2 md:grid-cols-7 gap-3">
                            <label class="flex items-center gap-2 bg-gray-50 dark:bg-gray-700 p-3 rounded-xl cursor-pointer"><input type="checkbox" value="0" class="day-checkbox w-5 h-5"> الأحد</label>
                            <label class="flex items-center gap-2 bg-gray-50 dark:bg-gray-700 p-3 rounded-xl cursor-pointer"><input type="checkbox" value="1" class="day-checkbox w-5 h-5"> الإثنين</label>
                            <label class="flex items-center gap-2 bg-gray-50 dark:bg-gray-700 p-3 rounded-xl cursor-pointer"><input type="checkbox" value="2" class="day-checkbox w-5 h-5"> الثلاثاء</label>
                            <label class="flex items-center gap-2 bg-gray-50 dark:bg-gray-700 p-3 rounded-xl cursor-pointer"><input type="checkbox" value="3" class="day-checkbox w-5 h-5"> الأربعاء</label>
                            <label class="flex items-center gap-2 bg-gray-50 dark:bg-gray-700 p-3 rounded-xl cursor-pointer"><input type="checkbox" value="4" class="day-checkbox w-5 h-5"> الخميس</label>
                            <label class="flex items-center gap-2 bg-gray-50 dark:bg-gray-700 p-3 rounded-xl cursor-pointer"><input type="checkbox" value="5" class="day-checkbox w-5 h-5"> الجمعة</label>
                            <label class="flex items-center gap-2 bg-gray-50 dark:bg-gray-700 p-3 rounded-xl cursor-pointer"><input type="checkbox" value="6" class="day-checkbox w-5 h-5"> السبت</label>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div><label class="block font-medium mb-2"><i class="fas fa-hourglass-start"></i> <span data-key="startTime">بداية الدوام</span></label>
                        <input type="time" id="workStart" class="w-full border rounded-xl px-4 py-3 dark:bg-gray-700 dark:border-gray-600"></div>
                        <div><label class="block font-medium mb-2"><i class="fas fa-hourglass-end"></i> <span data-key="endTime">نهاية الدوام</span></label>
                        <input type="time" id="workEnd" class="w-full border rounded-xl px-4 py-3 dark:bg-gray-700 dark:border-gray-600"></div>
                    </div>
                    <div>
                        <label class="block font-medium mb-2"><i class="fas fa-ban"></i> <span data-key="blockedDatesLabel">التواريخ المحظورة (إجازات)</span></label>
                        <div class="flex flex-wrap gap-3 items-center">
                            <input type="date" id="blockedDateInput" class="border rounded-xl px-4 py-2 dark:bg-gray-700">
                            <button type="button" id="addBlockedDateBtn" class="bg-gray-200 dark:bg-gray-600 px-4 py-2 rounded-xl"><i class="fas fa-plus"></i> <span data-key="add">إضافة</span></button>
                        </div>
                        <div id="blockedDatesList" class="flex flex-wrap gap-2 mt-4"></div>
                    </div>
                    <div class="flex justify-end gap-3">
                        <button type="button" id="resetSettingsBtn" class="border border-gray-300 dark:border-gray-600 px-6 py-2.5 rounded-xl"><span data-key="reset">إعادة تعيين</span></button>
                        <button type="submit" class="bg-blue-700 hover:bg-blue-800 text-white px-8 py-2.5 rounded-xl shadow"><i class="fas fa-save ml-1"></i> <span data-key="saveSettings">حفظ الإعدادات</span></button>
                    </div>
                </form>
                <div id="settingsMessage" class="mt-4 text-sm text-center"></div>
            </div>
        </div>
    </div>

    <!-- Modal تعديل الموعد -->
    <div id="editModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden transition-all">
        <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 w-full max-w-md mx-4 shadow-2xl">
            <h3 class="text-xl font-bold mb-4" data-key="editAppointment">تعديل الموعد</h3>
            <input type="hidden" id="editId">
            <div class="space-y-4">
                <input type="text" id="editName" placeholder="الاسم" class="w-full border rounded-xl p-3 dark:bg-gray-700">
                <input type="tel" id="editPhone" placeholder="الهاتف" class="w-full border rounded-xl p-3 dark:bg-gray-700">
                <input type="date" id="editDate" class="w-full border rounded-xl p-3 dark:bg-gray-700">
                <input type="time" id="editTime" class="w-full border rounded-xl p-3 dark:bg-gray-700">
                <select id="editStatus" class="w-full border rounded-xl p-3 dark:bg-gray-700">
                    <option value="pending">قيد الانتظار</option>
                    <option value="confirmed">مؤكد</option>
                    <option value="cancelled">ملغي</option>
                </select>
            </div>
            <div class="flex gap-3 mt-6">
                <button id="saveEditBtn" class="bg-blue-600 text-white flex-1 py-2 rounded-xl">حفظ</button>
                <button id="closeModalBtn" class="bg-gray-300 dark:bg-gray-600 flex-1 py-2 rounded-xl">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== تهيئة Supabase ====================
        const SUPABASE_URL = 'https://ncqvzpcqotdiwjqbwlwp.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_98lfpU1zaqG-MNxkhlvg6g_KEMPMPbS';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // متغيرات عامة
        let currentSettings = { allowed_days: [0,1,2,3,4], work_start: '09:00', work_end: '17:00', blocked_dates: [] };
        let currentLang = 'ar'; // ar / en
        let selectedAppointments = new Set(); // لتخزين ids المحددة

        // الترجمات
        const translations = {
            ar: {
                mainTitle: "نظام إدارة المواعيد", appointmentsTab: "المواعيد والإدارة", settingsTab: "القيود والإعدادات",
                appointmentsList: "جدول المواعيد", appointment: "موعد", refresh: "تحديث", deleteAll: "حذف الكل",
                sendSelected: "إرسال للمحددين", patient: "المريض", phone: "الهاتف", date: "التاريخ", time: "الوقت",
                status: "الحالة", actions: "إجراءات", editAppointment: "تعديل الموعد", clinicRules: "قيود العيادة",
                workDays: "أيام العمل", startTime: "بداية الدوام", endTime: "نهاية الدوام", blockedDatesLabel: "التواريخ المحظورة",
                add: "إضافة", reset: "إعادة تعيين", saveSettings: "حفظ الإعدادات", warningPrefix: "تنبيه: ",
                duplicateWarning: "موعد مكرر في نفس الوقت", dayOffWarning: "هذا اليوم ليس يوم عمل", timeWarning: "الوقت خارج ساعات الدوام",
                blockedWarning: "هذا التاريخ محظور", sendWhatsapp: "إرسال واتساب", edit: "تعديل", delete: "حذف"
            },
            en: {
                mainTitle: "Clinic Appointment System", appointmentsTab: "Appointments & Actions", settingsTab: "Rules & Settings",
                appointmentsList: "Appointments List", appointment: "appointment", refresh: "Refresh", deleteAll: "Delete All",
                sendSelected: "WhatsApp Selected", patient: "Patient", phone: "Phone", date: "Date", time: "Time",
                status: "Status", actions: "Actions", editAppointment: "Edit Appointment", clinicRules: "Clinic Constraints",
                workDays: "Working Days", startTime: "Start Time", endTime: "End Time", blockedDatesLabel: "Blocked Dates",
                add: "Add", reset: "Reset", saveSettings: "Save Settings", warningPrefix: "Warning: ",
                duplicateWarning: "Duplicate appointment time", dayOffWarning: "This day is not a working day",
                timeWarning: "Time outside working hours", blockedWarning: "This date is blocked", sendWhatsapp: "WhatsApp",
                edit: "Edit", delete: "Delete"
            }
        };

        function t(key) { return translations[currentLang][key] || key; }

        // تحديث واجهة النصوص
        function updateUILanguage() {
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (key) el.innerText = t(key);
            });
            document.getElementById('mainTitle').innerText = t('mainTitle');
            document.getElementById('langText').innerText = currentLang === 'ar' ? 'English' : 'العربية';
            // تحديث الأزرار في الجدول سيتم إعادة رسم الجدول
            fetchAndDisplayAppointments();
        }

        // ========== دوال مساعدة عامة ==========
        function showToast(message, type = 'info') {
            const toastDiv = document.createElement('div');
            toastDiv.className = `fixed bottom-5 left-5 z-50 toast-msg bg-${type === 'success' ? 'green' : type === 'error' ? 'red' : 'blue'}-600 text-white px-5 py-3 rounded-xl shadow-lg flex items-center gap-2 text-sm font-medium rtl`;
            toastDiv.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-triangle' : 'info-circle'}"></i> ${message}`;
            document.body.appendChild(toastDiv);
            setTimeout(() => toastDiv.remove(), 4000);
        }

        // تحويل رقم 05xxxx إلى 9665xxxx لواتساب
        function formatPhoneForWhatsapp(phone) {
            let raw = phone.replace(/\s+/g, '').replace(/^0+/, '');
            if (raw.startsWith('5') && raw.length === 9) return '966' + raw;
            if (raw.startsWith('9665')) return raw;
            return raw;
        }

        // فتح واتساب لرقم معين مع رسالة
        function sendWhatsapp(phone, patientName, date, time) {
            const formattedPhone = formatPhoneForWhatsapp(phone);
            const msg = `مرحباً ${patientName}، موعدك في العيادة يوم ${date} الساعة ${time}. شكراً لثقتكم.`;
            const url = `https://web.whatsapp.com/send?phone=${formattedPhone}&text=${encodeURIComponent(msg)}`;
            window.open(url, '_blank');
        }

        // التحقق من القيود وعرض تحذيرات (دون منع)
        async function validateWithWarnings(date, time) {
            const day = new Date(date).getDay();
            const warnings = [];
            if (!currentSettings.allowed_days.includes(day)) warnings.push(t('dayOffWarning'));
            if (time < currentSettings.work_start || time > currentSettings.work_end) warnings.push(t('timeWarning'));
            if (currentSettings.blocked_dates.includes(date)) warnings.push(t('blockedWarning'));
            // التحقق من التكرار
            const { data: duplicate, error } = await supabase.from('appointments').select('id').eq('appointment_date', date).eq('appointment_time', time);
            if (!error && duplicate && duplicate.length > 0) warnings.push(t('duplicateWarning'));
            if (warnings.length) {
                showToast(t('warningPrefix') + warnings.join(' - '), 'error');
            }
            return warnings;
        }

        // ========== جلب المواعيد وعرضها ==========
        async function fetchAndDisplayAppointments() {
            try {
                const { data, error } = await supabase.from('appointments').select('*').order('appointment_date', { ascending: true }).order('appointment_time', { ascending: true });
                if (error) throw error;
                document.getElementById('appointmentsCount').innerText = data.length;
                const tbody = document.getElementById('appointmentsTableBody');
                if (!data.length) {
                    tbody.innerHTML = `<tr><td colspan="7" class="text-center py-12 text-gray-400">${currentLang === 'ar' ? 'لا توجد مواعيد' : 'No appointments'}</td></tr>`;
                    return;
                }
                tbody.innerHTML = data.map(app => `
                    <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50 transition">
                        <td class="px-3 py-3 text-center"><input type="checkbox" class="appointment-checkbox" data-id="${app.id}" ${selectedAppointments.has(app.id) ? 'checked' : ''}></td>
                        <td class="px-4 py-3 font-medium">${escapeHtml(app.patient_name)}</td>
                        <td class="px-4 py-3 dir-ltr">${escapeHtml(app.phone)}</td>
                        <td class="px-4 py-3">${formatDate(app.appointment_date)}</td>
                        <td class="px-4 py-3">${app.appointment_time.slice(0,5)}</td>
                        <td class="px-4 py-3">
                            <select data-id="${app.id}" class="status-select border rounded-lg px-2 py-1 text-sm bg-gray-50 dark:bg-gray-700">
                                <option value="pending" ${app.status === 'pending' ? 'selected' : ''}>${currentLang === 'ar' ? 'قيد الانتظار' : 'Pending'}</option>
                                <option value="confirmed" ${app.status === 'confirmed' ? 'selected' : ''}>${currentLang === 'ar' ? 'مؤكد' : 'Confirmed'}</option>
                                <option value="cancelled" ${app.status === 'cancelled' ? 'selected' : ''}>${currentLang === 'ar' ? 'ملغي' : 'Cancelled'}</option>
                            </select>
                        </td>
                        <td class="px-4 py-3 flex gap-2 justify-center">
                            <button class="edit-appointment text-blue-600 hover:text-blue-800" data-id="${app.id}" data-name="${escapeHtml(app.patient_name)}" data-phone="${escapeHtml(app.phone)}" data-date="${app.appointment_date}" data-time="${app.appointment_time}" data-status="${app.status}"><i class="fas fa-edit"></i></button>
                            <button class="delete-appointment text-red-600 hover:text-red-800" data-id="${app.id}"><i class="fas fa-trash-alt"></i></button>
                            <button class="whatsapp-single text-green-600 hover:text-green-800" data-phone="${escapeHtml(app.phone)}" data-name="${escapeHtml(app.patient_name)}" data-date="${formatDate(app.appointment_date)}" data-time="${app.appointment_time.slice(0,5)}"><i class="fab fa-whatsapp"></i></button>
                        </td>
                    </tr>
                `).join('');
                // إعادة ربط الأحداث
                attachTableEvents();
                updateSelectAllCheckbox();
            } catch (err) { console.error(err); showToast("خطأ في تحميل المواعيد", "error"); }
        }

        function attachTableEvents() {
            document.querySelectorAll('.status-select').forEach(sel => {
                sel.removeEventListener('change', handleStatusChange);
                sel.addEventListener('change', handleStatusChange);
            });
            document.querySelectorAll('.delete-appointment').forEach(btn => {
                btn.removeEventListener('click', handleDelete);
                btn.addEventListener('click', handleDelete);
            });
            document.querySelectorAll('.edit-appointment').forEach(btn => {
                btn.removeEventListener('click', handleEdit);
                btn.addEventListener('click', handleEdit);
            });
            document.querySelectorAll('.whatsapp-single').forEach(btn => {
                btn.removeEventListener('click', handleWhatsapp);
                btn.addEventListener('click', handleWhatsapp);
            });
            document.querySelectorAll('.appointment-checkbox').forEach(cb => {
                cb.removeEventListener('change', handleCheckboxChange);
                cb.addEventListener('change', handleCheckboxChange);
            });
        }

        function handleStatusChange(e) { updateStatus(e.target.getAttribute('data-id'), e.target.value); }
        async function updateStatus(id, newStatus) {
            await supabase.from('appointments').update({ status: newStatus }).eq('id', id);
            showToast(currentLang === 'ar' ? 'تم تحديث الحالة' : 'Status updated', 'success');
            fetchAndDisplayAppointments();
        }
        async function handleDelete(e) { const id = e.currentTarget.getAttribute('data-id'); if (confirm(currentLang === 'ar' ? 'حذف الموعد؟' : 'Delete appointment?')) { await supabase.from('appointments').delete().eq('id', id); showToast('تم الحذف', 'success'); fetchAndDisplayAppointments(); } }
        function handleEdit(e) {
            const btn = e.currentTarget;
            document.getElementById('editId').value = btn.getAttribute('data-id');
            document.getElementById('editName').value = btn.getAttribute('data-name');
            document.getElementById('editPhone').value = btn.getAttribute('data-phone');
            document.getElementById('editDate').value = btn.getAttribute('data-date');
            document.getElementById('editTime').value = btn.getAttribute('data-time');
            document.getElementById('editStatus').value = btn.getAttribute('data-status');
            document.getElementById('editModal').classList.remove('hidden');
        }
        function handleWhatsapp(e) {
            const btn = e.currentTarget;
            sendWhatsapp(btn.getAttribute('data-phone'), btn.getAttribute('data-name'), btn.getAttribute('data-date'), btn.getAttribute('data-time'));
        }
        function handleCheckboxChange(e) {
            const id = e.currentTarget.getAttribute('data-id');
            if (e.target.checked) selectedAppointments.add(id);
            else selectedAppointments.delete(id);
            updateSelectAllCheckbox();
        }
        function updateSelectAllCheckbox() {
            const allCb = document.querySelectorAll('.appointment-checkbox');
            const selectAll = document.getElementById('selectAllCheckbox');
            if (selectAll) selectAll.checked = allCb.length > 0 && Array.from(allCb).every(cb => cb.checked);
        }

        // حذف جميع المواعيد
        async function deleteAllAppointments() {
            if (!confirm(currentLang === 'ar' ? '⚠️ حذف جميع المواعيد نهائياً؟ لا يمكن التراجع' : 'Delete ALL appointments permanently?')) return;
            const { error } = await supabase.from('appointments').delete().neq('id', '00000000-0000-0000-0000-000000000000');
            if (error) showToast('فشل الحذف', 'error');
            else { showToast('تم حذف جميع المواعيد', 'success'); fetchAndDisplayAppointments(); selectedAppointments.clear(); }
        }

        // إرسال واتساب للمحددين
        function sendBulkWhatsapp() {
            const selectedRows = [];
            document.querySelectorAll('.appointment-checkbox:checked').forEach(cb => {
                const row = cb.closest('tr');
                const phone = row.querySelector('.whatsapp-single')?.getAttribute('data-phone');
                const name = row.querySelector('.whatsapp-single')?.getAttribute('data-name');
                const date = row.querySelector('.whatsapp-single')?.getAttribute('data-date');
                const time = row.querySelector('.whatsapp-single')?.getAttribute('data-time');
                if (phone && name) selectedRows.push({ phone, name, date, time });
            });
            if (selectedRows.length === 0) { showToast(currentLang === 'ar' ? 'اختر مواعيد أولاً' : 'Select appointments first', 'error'); return; }
            if (selectedRows.length > 3 && !confirm(currentLang === 'ar' ? `سيتم فتح ${selectedRows.length} نافذة واتساب. قد يمنع المتصفح النوافذ المنبثقة. متابعة؟` : `Will open ${selectedRows.length} WhatsApp windows. Allow popups?`)) return;
            for (let app of selectedRows) sendWhatsapp(app.phone, app.name, app.date, app.time);
        }

        // ========== إدارة الإعدادات (القيود) ==========
        async function fetchSettings() {
            const { data, error } = await supabase.from('clinic_settings').select('*').eq('id', 1).maybeSingle();
            if (error) console.error(error);
            if (data) {
                currentSettings.allowed_days = data.allowed_days || [0,1,2,3,4];
                currentSettings.work_start = data.work_start || '09:00';
                currentSettings.work_end = data.work_end || '17:00';
                currentSettings.blocked_dates = data.blocked_dates || [];
            } else {
                const def = { id: 1, allowed_days: [0,1,2,3,4], work_start: '09:00', work_end: '17:00', blocked_dates: [] };
                await supabase.from('clinic_settings').insert(def);
                currentSettings = { allowed_days: def.allowed_days, work_start: def.work_start, work_end: def.work_end, blocked_dates: def.blocked_dates };
            }
            updateSettingsUI();
        }
        function updateSettingsUI() {
            document.querySelectorAll('.day-checkbox').forEach(cb => { cb.checked = currentSettings.allowed_days.includes(parseInt(cb.value)); });
            document.getElementById('workStart').value = currentSettings.work_start.slice(0,5);
            document.getElementById('workEnd').value = currentSettings.work_end.slice(0,5);
            const container = document.getElementById('blockedDatesList');
            container.innerHTML = '';
            currentSettings.blocked_dates.forEach(date => {
                const badge = document.createElement('span'); badge.className = 'bg-red-100 dark:bg-red-900 text-red-800 dark:text-red-200 px-3 py-1 rounded-full text-sm flex items-center gap-2';
                badge.innerHTML = `${date} <button type="button" class="remove-blocked-date hover:text-red-600" data-date="${date}"><i class="fas fa-times-circle"></i></button>`;
                container.appendChild(badge);
            });
            document.querySelectorAll('.remove-blocked-date').forEach(btn => btn.addEventListener('click', (e) => { const d = btn.getAttribute('data-date'); currentSettings.blocked_dates = currentSettings.blocked_dates.filter(x => x !== d); updateSettingsUI(); }));
        }
        async function saveSettings() {
            const allowedDays = Array.from(document.querySelectorAll('.day-checkbox:checked')).map(cb => parseInt(cb.value));
            const workStart = document.getElementById('workStart').value, workEnd = document.getElementById('workEnd').value;
            const newSet = { allowed_days: allowedDays, work_start: workStart, work_end: workEnd, blocked_dates: currentSettings.blocked_dates };
            const { error } = await supabase.from('clinic_settings').upsert({ id: 1, ...newSet });
            if (error) { showToast('فشل الحفظ', 'error'); } else { currentSettings = { ...newSet }; showToast('تم حفظ القيود', 'success'); }
        }
        function resetSettingsToDefault() {
            currentSettings = { allowed_days: [0,1,2,3,4], work_start: '09:00', work_end: '17:00', blocked_dates: [] };
            updateSettingsUI();
            showToast(currentLang === 'ar' ? 'تمت إعادة التعيين (لم يحفظ بعد)' : 'Reset to default (not saved)', 'info');
        }

        // ========== إضافة موعد جديد (مع تحذيرات فقط) ==========
        document.getElementById('newAppointmentForm')?.remove(); // سنضيف النموذج في صفحة المواعيد - نضيفه ديناميكياً في أعلى صفحة المواعيد
        // نضيف form للإضافة داخل appointmentsPanel
        const addFormHtml = `<div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-5 mb-6 border">
            <h3 class="text-xl font-bold mb-3"><i class="fas fa-plus-circle text-green-600"></i> <span data-key="newAppointment">تسجيل موعد جديد</span></h3>
            <form id="newAppointmentForm" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="patientName" placeholder="${currentLang === 'ar' ? 'الاسم الكامل' : 'Full name'}" class="border rounded-xl p-2 dark:bg-gray-700" required>
                <input type="tel" id="phone" placeholder="${currentLang === 'ar' ? 'الهاتف' : 'Phone'}" class="border rounded-xl p-2 dark:bg-gray-700" required>
                <input type="date" id="appointmentDate" class="border rounded-xl p-2 dark:bg-gray-700" required>
                <input type="time" id="appointmentTime" class="border rounded-xl p-2 dark:bg-gray-700" required>
                <button type="submit" class="bg-blue-600 text-white rounded-xl py-2 col-span-full md:col-span-1">${currentLang === 'ar' ? 'حفظ الموعد' : 'Save Appointment'}</button>
            </form>
            <div id="newAppointmentMsg" class="mt-2 text-sm"></div>
        </div>`;
        document.getElementById('appointmentsPanel').insertAdjacentHTML('afterbegin', addFormHtml);

        async function handleNewAppointment(e) {
            e.preventDefault();
            const patient_name = document.getElementById('patientName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const appointment_date = document.getElementById('appointmentDate').value;
            const appointment_time = document.getElementById('appointmentTime').value;
            if (!patient_name || !phone || !appointment_date || !appointment_time) { showToast('يرجى ملء جميع الحقول', 'error'); return; }
            // تحذيرات فقط وليس منع
            await validateWithWarnings(appointment_date, appointment_time);
            // دائماً نقوم بالإدراج
            const { error } = await supabase.from('appointments').insert([{ patient_name, phone, appointment_date, appointment_time, status: 'pending' }]);
            if (error) showToast('فشل الإضافة: ' + error.message, 'error');
            else { showToast('تم إضافة الموعد بنجاح', 'success'); document.getElementById('newAppointmentForm').reset(); fetchAndDisplayAppointments(); }
        }

        // ========== تعديل الموعد (modal) ==========
        document.getElementById('saveEditBtn').onclick = async () => {
            const id = document.getElementById('editId').value;
            const patient_name = document.getElementById('editName').value;
            const phone = document.getElementById('editPhone').value;
            const appointment_date = document.getElementById('editDate').value;
            const appointment_time = document.getElementById('editTime').value;
            const status = document.getElementById('editStatus').value;
            await supabase.from('appointments').update({ patient_name, phone, appointment_date, appointment_time, status }).eq('id', id);
            showToast('تم التعديل', 'success');
            document.getElementById('editModal').classList.add('hidden');
            fetchAndDisplayAppointments();
        };
        document.getElementById('closeModalBtn').onclick = () => document.getElementById('editModal').classList.add('hidden');

        // ========== أحداث عامة ==========
        document.getElementById('refreshAppointmentsBtn').onclick = fetchAndDisplayAppointments;
        document.getElementById('deleteAllBtn').onclick = deleteAllAppointments;
        document.getElementById('bulkWhatsappBtn').onclick = sendBulkWhatsapp;
        document.getElementById('selectAllCheckbox')?.addEventListener('change', (e) => {
            document.querySelectorAll('.appointment-checkbox').forEach(cb => { cb.checked = e.target.checked; if(e.target.checked) selectedAppointments.add(cb.getAttribute('data-id')); else selectedAppointments.delete(cb.getAttribute('data-id')); });
        });
        document.getElementById('settingsForm').addEventListener('submit', (e) => { e.preventDefault(); saveSettings(); });
        document.getElementById('addBlockedDateBtn').onclick = () => { const d = document.getElementById('blockedDateInput').value; if(d && !currentSettings.blocked_dates.includes(d)) { currentSettings.blocked_dates.push(d); updateSettingsUI(); } };
        document.getElementById('resetSettingsBtn').onclick = resetSettingsToDefault;

        // تبديل التبويبات
        function switchTab(tab) {
            document.getElementById('appointmentsPanel').classList.toggle('hidden', tab !== 'appointments');
            document.getElementById('settingsPanel').classList.toggle('hidden', tab !== 'settings');
            const btn1 = document.getElementById('tabAppointmentsBtn'), btn2 = document.getElementById('tabSettingsBtn');
            if (tab === 'appointments') { btn1.classList.add('bg-blue-600','text-white'); btn1.classList.remove('bg-gray-200','dark:bg-gray-700'); btn2.classList.remove('bg-blue-600','text-white'); btn2.classList.add('bg-gray-200','dark:bg-gray-700'); fetchAndDisplayAppointments(); }
            else { btn2.classList.add('bg-blue-600','text-white'); btn2.classList.remove('bg-gray-200','dark:bg-gray-700'); btn1.classList.remove('bg-blue-600','text-white'); btn1.classList.add('bg-gray-200','dark:bg-gray-700'); fetchSettings(); }
        }
        document.getElementById('tabAppointmentsBtn').onclick = () => switchTab('appointments');
        document.getElementById('tabSettingsBtn').onclick = () => switchTab('settings');

        // الوضع الليلي
        let isDark = false;
        document.getElementById('darkModeToggle').onclick = () => {
            isDark = !isDark;
            if (isDark) document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark');
            document.body.classList.toggle('dark', isDark);
        };
        // اللغة
        document.getElementById('langToggle').onclick = () => { currentLang = currentLang === 'ar' ? 'en' : 'ar'; updateUILanguage(); fetchAndDisplayAppointments(); };

        // إضافة حدث الفورم الجديد
        document.getElementById('newAppointmentForm')?.addEventListener('submit', handleNewAppointment);
        function formatDate(dateStr) { return new Date(dateStr).toLocaleDateString(currentLang === 'ar' ? 'ar-EG' : 'en-US'); }
        function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

        // بدء التشغيل
        (async () => { await fetchSettings(); switchTab('appointments'); })();
    </script>
</body>
</html>
